name: Verkoop naar USD

on:
  workflow_dispatch: {}

env:
  PYTHONUNBUFFERED: "1"
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
  KRAKEN_API_KEY: ${{ secrets.KRAKEN_API_KEY }}
  KRAKEN_API_SECRET: ${{ secrets.KRAKEN_API_SECRET }}

jobs:
  sell:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Verkoop alle crypto naar USD
        run: |
          python3 - <<'PY'
import sys, time
sys.path.insert(0, '.')
from src.kraken import get_balance, cancel_all_orders, place_market_order, find_usd_pair, get_ticker
from src.notify import send_message
from src.state import clear_positions

STABLE = {"ZUSD", "USD", "USDT", "USDC", "DAI"}

balances = get_balance()
crypto = {k: v for k, v in balances.items() if k not in STABLE and v > 0.0001}

if not crypto:
    send_message('ℹ️ Geen open posities om te verkopen.')
    sys.exit(0)

try:
    cancel_all_orders()
    time.sleep(2)
except Exception as e:
    print(f'Cancel waarschuwing: {e}')

for asset, amount in crypto.items():
    sym = asset.lstrip('X').rstrip('Z') if len(asset) == 4 else asset
    pair = find_usd_pair(sym) or find_usd_pair(asset)
    if not pair:
        send_message(f'❌ Geen USD pair gevonden voor {asset}')
        continue
    ticker = get_ticker(pair)
    est_usd = amount * ticker.get('last', 0)
    send_message(f'🔴 <b>Verkoop gestart: {sym}</b>\nHoeveelheid: {amount:.4f} (~${est_usd:.2f})')
    place_market_order(pair, 'sell', amount)
    time.sleep(3)
    ticker2 = get_ticker(pair)
    sell_price = ticker2.get('last', 0)
    send_message(
        f'✅ <b>{sym} verkocht naar USD</b>\n'
        f'@ ${sell_price:.4f}\n'
        f'~${amount * sell_price:.2f} ontvangen'
    )

clear_positions()
PY
